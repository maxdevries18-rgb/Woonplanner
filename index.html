    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Fix witte balk boven en onder op iPhone webapp */
    html {
      background: #1a1a2e;
      height: 100%;
    }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      background-attachment: fixed;
      min-height: 100%;
      min-height: -webkit-fill-available;
      /* Voorkom wit vlak bij overscroll */
      overscroll-behavior: none;
    }
    #root {
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* Safe area padding voor iPhone notch/Dynamic Island */
    .safe-top { padding-top: env(safe-area-inset-top); }
    .safe-bottom { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .task-card { transition: all 0.2s ease; }
    .task-card:hover { transform: translateY(-2px); }
    .day-col { transition: all 0.2s; }
    .day-col:hover { background: rgba(255,255,255,0.07) !important; }
    .btn-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,107,107,0); } }
    .slide-in { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
    .notif { animation: notifIn 0.3s ease; }
    @keyframes notifIn { from { opacity:0; transform: translateX(100px); } to { opacity:1; transform: translateX(0); } }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #FF6B6B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .color-swatch:hover { transform: scale(1.15); }

const DAYS_FULL = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];

function getWeekDates(weekOffset = 0) {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7) + weekOffset * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return { week: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
}

function formatDate(d) {
  return `${d.getDate()} ${["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"][d.getMonth()]}`;
}

function normalizeTask(t) {
  return { id: t.id, title: t.title, userId: t.user_id, category: t.category, dayIndex: t.day_index, done: t.done, deadline: t.deadline || "", weekMonday: t.week_monday || null };
}

// ─── TaskCard ─────────────────────────────────────────────────────────────────
function TaskCard({ task, onToggle, onDelete, showDay, categories, allUsers }) {
  const u = allUsers.find(u => u.id == task.userId) || { color: "#888", username: "?" };
  const c = categories.find(c => c.id === task.category) || { icon: "🏷️", label: task.category };
  const weekDates = getWeekDates();
  return (
    <div className="task-card" style={{
      background: `linear-gradient(135deg, ${u.color}11, ${u.color}06)`,
      border: `1px solid ${u.color}33`, borderLeft: `4px solid ${u.color}`,
      borderRadius: 14, padding: "14px 16px",
      display: "flex", alignItems: "center", gap: 12, opacity: task.done ? 0.55 : 1,
    }}>
      <button onClick={() => onToggle(task.id, task.done)} style={{
        width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
        background: task.done ? u.color : "transparent",
        border: `2px solid ${u.color}`, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 14, color: "#fff", transition: "all 0.2s",
      }}>{task.done ? "✓" : ""}</button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: "#f0f0f0", textDecoration: task.done ? "line-through" : "none" }}>
          {c.icon} {task.title}
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, background: u.color + "22", color: u.color, borderRadius: 6, padding: "2px 8px", fontWeight: 700 }}>
            {u.username[0]?.toUpperCase()} {u.username}
          </span>
          {showDay && <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", padding: "2px 0" }}>{DAYS[task.dayIndex]} {formatDate(weekDates[task.dayIndex])}</span>}
          {task.deadline && <span style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", padding: "2px 0" }}>{task.deadline === "hele_dag" ? "🌅 Hele dag" : `🕐 ${task.deadline}`}</span>}
        </div>
      </div>
      <button onClick={() => onDelete(task.id)} style={{
        background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 8,
        padding: "6px 8px", cursor: "pointer", color: "rgba(255,255,255,0.3)", fontSize: 14,

// ─── Hoofd App ────────────────────────────────────────────────────────────────
function App() {
  const [currentUser, setCurrentUser] = useState(null);

  const [tasks, setTasks] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [view, setView] = useState("week");
  const [selectedDay, setSelectedDay] = useState(() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; });
  const [showModal, setShowModal] = useState(false);
  const [notification, setNotification] = useState(null);
  const [filterUser, setFilterUser] = useState("all");
  const [saving, setSaving] = useState(false);
  const [refreshing, setRefreshing] = useState(false);
  const [categories, setCategories] = useState(() => {
    try { const s = localStorage.getItem("woonplanner_categories"); return s ? JSON.parse(s) : DEFAULT_CATEGORIES; }
    catch { return DEFAULT_CATEGORIES; }
  });
  const [showLabelManager, setShowLabelManager] = useState(false);
  const [newLabel, setNewLabel] = useState({ label: "", icon: "🏷️" });
  const [form, setForm] = useState({ title: "", category: DEFAULT_CATEGORIES[0].id, dayIndex: 0, deadline: "hele_dag" });
  const [weekOffset, setWeekOffset] = useState(0);

  const weekDates = getWeekDates(weekOffset);
  const todayIndex = weekOffset === 0 ? (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })() : -1;

  // Herstel sessie bij laden
  useEffect(() => {
    async function herstelSessie() {
      const savedId = localStorage.getItem("woonplanner_user_id");
      if (savedId) {
        const { data } = await supabase.from('users').select('*').eq('id', parseInt(savedId)).single();
        if (data) setCurrentUser(data);
      }
      setLoading(false);
    }
    herstelSessie();
  }, []);

  // Laad alle gebruikers
  const loadUsers = useCallback(async () => {
    const { data } = await supabase.from('users').select('*').order('created_at');
    setAllUsers(data || []);
  }, []);

  // Laad taken
  const loadTasks = useCallback(async () => {
    try {
      const { data, error } = await supabase.from('tasks').select('*').order('created_at', { ascending: true });
      if (error) throw error;
      setTasks(data.map(normalizeTask));
    } catch (e) {
      setError('Database verbinding mislukt: ' + e.message);
    }
  }, []);

  useEffect(() => {
    if (currentUser) { loadTasks(); loadUsers(); }
  }, [currentUser, loadTasks, loadUsers]);

  useEffect(() => {
    if (!currentUser) return;
    const interval = setInterval(loadTasks, 30000);
    return () => clearInterval(interval);
  }, [currentUser, loadTasks]);

  useEffect(() => {
    try { localStorage.setItem("woonplanner_categories", JSON.stringify(categories)); } catch {}
  }, [categories]);

  function handleLogin(user) { setCurrentUser(user); }

  function uitloggen() {
    localStorage.removeItem("woonplanner_user_id");
    setCurrentUser(null);
    setTasks([]);
  }

  // Maandag van de zichtbare week als ISO string (voor filteren)
  const currentMonday = weekDates[0].toISOString().split('T')[0];

  const filtered = tasks.filter(t => {
    const matchUser = filterUser === "all" || t.userId == filterUser;
    const matchWeek = t.weekMonday === currentMonday;
    return matchUser && matchWeek;
  });

  async function refresh() {
    setRefreshing(true);
    await loadTasks();
    await loadUsers();
    setTimeout(() => setRefreshing(false), 500);
  }

  async function toggleDone(id, currentDone) {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, done: !currentDone } : t));
    try {
      const { error } = await supabase.from('tasks').update({ done: !currentDone }).eq('id', id);
      if (error) throw error;
      if (!currentDone) showNotif("✅ Afgevinkt!", "");
    } catch {
      setTasks(prev => prev.map(t => t.id === id ? { ...t, done: currentDone } : t));
      showNotif("❌ Mislukt", "Probeer het opnieuw");
    }
  }

  async function addTask() {
    if (!form.title.trim()) return;
    setSaving(true);
    try {
      const { data, error } = await supabase.from('tasks').insert([{
        title: form.title, user_id: currentUser.id,
        category: form.category, day_index: form.dayIndex,
        done: false, deadline: form.deadline || '',
        week_monday: currentMonday,
      }]).select().single();
      if (error) throw error;
      setTasks(prev => [...prev, normalizeTask(data)]);
      showNotif("🎉 Toegevoegd!", form.title);
      setShowModal(false);
      setForm(f => ({ ...f, title: "", dayIndex: selectedDay, deadline: "hele_dag" }));
    } catch { showNotif("❌ Mislukt", "Kon taak niet opslaan"); }
    finally { setSaving(false); }
  }

  async function deleteTask(id) {
    setTasks(prev => prev.filter(t => t.id !== id));
    try {
      const { error } = await supabase.from('tasks').delete().eq('id', id);
      if (error) throw error;
    } catch { showNotif("❌ Mislukt", "Kon taak niet verwijderen"); loadTasks(); }
  }

  function openModal(dayIndex) { setForm(f => ({ ...f, dayIndex, title: "", deadline: "hele_dag" })); setShowModal(true); }
  function addLabel() {
    if (!newLabel.label.trim()) return;
    setCategories(prev => [...prev, { id: "custom_" + Date.now(), label: newLabel.label.trim(), icon: newLabel.icon }]);
    setNewLabel({ label: "", icon: "🏷️" });
  }
  function deleteLabel(id) { setCategories(prev => prev.filter(c => c.id !== id)); }
  function showNotif(title, body) { setNotification({ title, body }); setTimeout(() => setNotification(null), 3000); }
  const tasksByDay = (i) => filtered.filter(t => t.dayIndex === i);

  // Loading
  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh" }}>
      <div className="spinner" />
    </div>
  );

  // Niet ingelogd
  if (!currentUser) return <LoginScreen onLogin={handleLogin} />;

  // Error
  if (error) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", gap: 16, padding: 32, textAlign: "center" }}>
      <div style={{ fontSize: 48 }}>⚠️</div>
      <p style={{ color: "#FF6B6B", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, fontSize: 18 }}>Database niet bereikbaar</p>
      <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14 }}>{error}</p>
      <button onClick={loadTasks} style={{ background: "#FF6B6B", color: "#fff", border: "none", borderRadius: 12, padding: "12px 24px", cursor: "pointer", fontWeight: 700 }}>Opnieuw proberen</button>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: "#f0f0f0", paddingBottom: "calc(80px + env(safe-area-inset-bottom))" }}>

      {notification && (
        <div className="notif" style={{
          position: "fixed", top: "calc(20px + env(safe-area-inset-top))", right: 20, zIndex: 9999,
          background: "linear-gradient(135deg, #2d2d5e, #3d3d7e)",
          border: "1px solid rgba(255,255,255,0.15)", borderRadius: 16,
          padding: "14px 20px", boxShadow: "0 20px 60px rgba(0,0,0,0.5)", maxWidth: 280,
        }}>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{notification.title}</div>
          {notification.body && <div style={{ fontSize: 12, opacity: 0.7, marginTop: 2 }}>{notification.body}</div>}
        </div>
      )}

      {/* Header */}
      <div style={{ paddingTop: "calc(20px + env(safe-area-inset-top))", paddingBottom: 14, paddingLeft: 20, paddingRight: 20, background: "rgba(26,26,46,0.97)", borderBottom: "1px solid rgba(255,255,255,0.06)", backdropFilter: "blur(10px)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 900, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
            <div>
              <h1 style={{ fontSize: 22, fontWeight: 900, letterSpacing: -1, fontFamily: "'Space Mono', monospace" }}>🏠 WoonPlanner</h1>
              {/* Week navigator */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                <button onClick={() => setWeekOffset(o => o - 1)} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 8, width: 28, height: 28, color: "#fff", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>‹</button>
                <div style={{ textAlign: "center" }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: weekOffset === 0 ? "#4ECDC4" : "rgba(255,255,255,0.6)" }}>
                    {weekOffset === 0 ? "Deze week" : weekOffset === 1 ? "Volgende week" : weekOffset === -1 ? "Vorige week" : `Week ${getWeekNumber(weekDates[0]).week}`}
                    {" "}
                    <span style={{ opacity: 0.5, fontWeight: 400 }}>({formatDate(weekDates[0])} – {formatDate(weekDates[6])})</span>
                  </span>
                </div>
                <button onClick={() => setWeekOffset(o => o + 1)} style={{ background: "rgba(255,255,255,0.08)", border: "none", borderRadius: 8, width: 28, height: 28, color: "#fff", cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>›</button>
                {weekOffset !== 0 && (
                  <button onClick={() => setWeekOffset(0)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 8, padding: "3px 8px", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>Vandaag</button>
                )}
                <button onClick={refresh} title="Verversen" style={{
                  background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
                  borderRadius: 8, width: 26, height: 26, cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13,
                  animation: refreshing ? "spin 0.5s linear" : "none",
                }}>🔄</button>
                <span style={{ fontSize: 11, color: "#4ECDC4" }}>● live</span>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              {/* User filter knoppen */}
              {[{ id: "all", username: "Iedereen", color: "#888" }, ...allUsers].map(u => (
                <button key={u.id} onClick={() => setFilterUser(u.id)} style={{
                  background: filterUser == u.id ? u.color : "rgba(255,255,255,0.06)",
                  color: "#fff", border: "none", borderRadius: 20, padding: "5px 12px",
                  fontSize: 12, fontWeight: 700, cursor: "pointer", opacity: filterUser == u.id ? 1 : 0.5,
                  transition: "all 0.2s",
                }}>{u.username}</button>
              ))}
              {/* Huidig ingelogde gebruiker + uitloggen */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: 4, paddingLeft: 12, borderLeft: "1px solid rgba(255,255,255,0.1)" }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: currentUser.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 900 }}>
                  {currentUser.username[0].toUpperCase()}
                </div>
                <span style={{ fontSize: 13, fontWeight: 700, opacity: 0.8 }}>{currentUser.username}</span>
                <button onClick={uitloggen} style={{ background: "rgba(255,255,255,0.06)", border: "none", borderRadius: 8, padding: "4px 8px", color: "rgba(255,255,255,0.4)", fontSize: 11, cursor: "pointer", fontWeight: 700 }}>Wissel</button>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 4, background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: 4, width: "fit-content" }}>
            {[{ id: "week", label: "📅 Week" }, { id: "day", label: "🌤 Dag" }, { id: "tasks", label: "📋 Taken" }].map(v => (
              <button key={v.id} onClick={() => setView(v.id)} style={{
                background: view === v.id ? "rgba(255,255,255,0.15)" : "transparent",
                color: view === v.id ? "#fff" : "rgba(255,255,255,0.5)",
                border: "none", borderRadius: 8, padding: "7px 16px",
                fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s",
              }}>{v.label}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px" }}>

        {/* WEEK VIEW */}
        {view === "week" && (
          <div className="week-grid slide-in">
            {DAYS.map((day, i) => (
              <div key={i} className="day-col week-day-col" onClick={() => { setSelectedDay(i); setView("day"); }} style={{
                background: i === todayIndex ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.03)",
                borderRadius: 16, padding: "12px 8px",
                border: i === todayIndex ? "1px solid rgba(255,255,255,0.2)" : "1px solid rgba(255,255,255,0.05)",
                cursor: "pointer", minHeight: 160,
              }}>
                <div style={{ textAlign: "center", marginBottom: 10 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, opacity: 0.5, textTransform: "uppercase", letterSpacing: 1 }}>{day}</div>
                  <div style={{ fontSize: 20, fontWeight: 900, fontFamily: "'Space Mono', monospace", color: i === todayIndex ? "#FF6B6B" : "inherit" }}>{weekDates[i].getDate()}</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {tasksByDay(i).slice(0, 3).map(t => {
                    const u = allUsers.find(u => u.id == t.userId) || { color: "#888" };
                    const c = categories.find(c => c.id === t.category) || { icon: "🏷️" };
                    return (
                      <div key={t.id} style={{
                        background: u.color + "22", borderLeft: `3px solid ${u.color}`,
                        borderRadius: "0 6px 6px 0", padding: "4px 6px",
                        fontSize: 10, fontWeight: 600, opacity: t.done ? 0.4 : 1,
                        overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis", color: "#f0f0f0",
                      }}>{c.icon} {t.title}</div>
                    );
                  })}
                  {tasksByDay(i).length > 3 && <div style={{ fontSize: 10, opacity: 0.4, textAlign: "center" }}>+{tasksByDay(i).length - 3} meer</div>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* DAY VIEW */}
        {view === "day" && (
          <div className="slide-in">
            <div style={{ display: "flex", gap: 6, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
              {DAYS.map((d, i) => (
                <button key={i} onClick={() => setSelectedDay(i)} style={{
                  background: selectedDay === i ? (i === todayIndex ? "#FF6B6B" : "rgba(255,255,255,0.15)") : "rgba(255,255,255,0.04)",
                  border: "none", borderRadius: 12, padding: "8px 16px",
                  color: selectedDay === i ? "#fff" : "rgba(255,255,255,0.5)",
                  cursor: "pointer", fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", flexShrink: 0,
                }}>{d} {weekDates[i].getDate()}</button>
              ))}
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 900, marginBottom: 16, fontFamily: "'Space Mono', monospace" }}>
              {DAYS_FULL[selectedDay]} <span style={{ opacity: 0.4, fontWeight: 400, fontSize: 16 }}>{formatDate(weekDates[selectedDay])}</span>
            </h2>
            {tasksByDay(selectedDay).length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px", opacity: 0.3 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>😴</div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>Niks gepland!</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {tasksByDay(selectedDay).sort((a, b) => a.deadline.localeCompare(b.deadline)).map(t => (
                  <TaskCard key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} categories={categories} allUsers={allUsers} />
                ))}
              </div>
            )}
          </div>
        )}

        {/* TASKS VIEW */}
        {view === "tasks" && (
          <div className="slide-in">
            {categories.map(c => {
              const catTasks = filtered.filter(t => t.category === c.id);
              if (!catTasks.length) return null;
              return (
                <div key={c.id} style={{ marginBottom: 28 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 800, marginBottom: 12, opacity: 0.7, letterSpacing: 1, textTransform: "uppercase" }}>
                    {c.icon} {c.label}
                    <span style={{ background: "rgba(255,255,255,0.1)", borderRadius: 20, padding: "2px 8px", fontSize: 11, marginLeft: 8 }}>{catTasks.length}</span>
                  </h3>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {catTasks.sort((a, b) => a.dayIndex - b.dayIndex).map(t => (
                      <TaskCard key={t.id} task={t} onToggle={toggleDone} onDelete={deleteTask} showDay categories={categories} allUsers={allUsers} />
                    ))}
                  </div>
                </div>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 20px", opacity: 0.3 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📭</div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>Geen taken gevonden</div>
              </div>
            )}
          </div>
        )}

        {/* Stats */}
        <div style={{ marginTop: 32, display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
          {[
            { label: "Totaal", value: filtered.length, icon: "📋", color: "#7c7cff" },
            { label: "Gedaan", value: filtered.filter(t => t.done).length, icon: "✅", color: "#4ECDC4" },
            { label: "Open", value: filtered.filter(t => !t.done).length, icon: "⏳", color: "#FF6B6B" },
          ].map(s => (
            <div key={s.label} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 16, padding: "16px 20px", border: "1px solid rgba(255,255,255,0.06)", textAlign: "center" }}>
              <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
              <div style={{ fontSize: 28, fontWeight: 900, fontFamily: "'Space Mono', monospace", color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 12, opacity: 0.5, marginTop: 2, fontWeight: 600 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* FAB */}
      <button className="btn-pulse" onClick={() => openModal(selectedDay)} style={{
        position: "fixed", bottom: "calc(28px + env(safe-area-inset-bottom))", right: 24,
        background: `linear-gradient(135deg, ${currentUser.color}, ${currentUser.color}bb)`,
        color: "#fff", border: "none", borderRadius: "50%",
        width: 60, height: 60, fontSize: 28, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontWeight: 900, zIndex: 200,
      }}>+</button>

      {/* Label manager knop */}
      <button onClick={() => setShowLabelManager(true)} style={{
        position: "fixed", bottom: "calc(28px + env(safe-area-inset-bottom))", left: 24,
        background: "rgba(255,255,255,0.08)", color: "#fff",
        border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%",
        width: 50, height: 50, fontSize: 20, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200,
      }}>🏷️</button>

      {/* Modal - nieuwe taak */}
      {showModal && (
        <div onClick={() => setShowModal(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 500, backdropFilter: "blur(4px)" }}>
          <div className="slide-in" onClick={e => e.stopPropagation()} style={{ background: "linear-gradient(180deg, #1e1e3f, #16163a)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "24px 24px 0 0", padding: "28px 24px 40px", width: "100%", maxWidth: 500, maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
              <div style={{ width: 32, height: 32, borderRadius: "50%", background: currentUser.color, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 14 }}>{currentUser.username[0].toUpperCase()}</div>
              <h3 style={{ fontSize: 18, fontWeight: 900, color: "#f0f0f0", fontFamily: "'Space Mono', monospace" }}>Taak voor {currentUser.username}</h3>
            </div>

            <input placeholder="Wat moet er gebeuren?" value={form.title}
              onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
              onKeyDown={e => e.key === "Enter" && addTask()}
              style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, padding: "14px 16px", color: "#fff", fontSize: 15, marginBottom: 16, outline: "none" }}
            />

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              <div>
                <label style={{ fontSize: 11, opacity: 0.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 6, color: "#fff" }}>Tijdstip</label>
                <select value={form.deadline} onChange={e => setForm(f => ({ ...f, deadline: e.target.value }))} style={{ width: "100%", background: "#2a2a5a", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none", cursor: "pointer" }}>
                  {TIME_OPTIONS.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                </select>
              </div>
              <div>
                <label style={{ fontSize: 11, opacity: 0.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 6, color: "#fff" }}>Dag</label>
                <select value={form.dayIndex} onChange={e => setForm(f => ({ ...f, dayIndex: parseInt(e.target.value) }))} style={{ width: "100%", background: "#2a2a5a", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, padding: "10px 12px", color: "#fff", fontSize: 14, outline: "none", cursor: "pointer" }}>
                  {DAYS.map((d, i) => <option key={i} value={i}>{d} {weekDates[i].getDate()}</option>)}
                </select>
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 11, opacity: 0.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 6, color: "#fff" }}>Label</label>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {categories.map(c => (
                  <button key={c.id} onClick={() => setForm(f => ({ ...f, category: c.id }))} style={{
                    background: form.category === c.id ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.05)", color: "#fff",
                    border: form.category === c.id ? "1px solid rgba(255,255,255,0.3)" : "1px solid transparent",
                    borderRadius: 10, padding: "8px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer",
                  }}>{c.icon} {c.label}</button>
                ))}
              </div>
            </div>

            <button onClick={addTask} disabled={saving} style={{
              width: "100%", padding: "16px",
              background: saving ? "rgba(255,255,255,0.1)" : `linear-gradient(135deg, ${currentUser.color}, ${currentUser.color}bb)`,
              color: "#fff", border: "none", borderRadius: 14, fontSize: 16, fontWeight: 800, cursor: saving ? "not-allowed" : "pointer",
            }}>{saving ? "Opslaan..." : "Taak toevoegen 🚀"}</button>
          </div>
        </div>
      )}

      {/* Label manager modal */}
      {showLabelManager && (
        <div onClick={() => setShowLabelManager(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 500, backdropFilter: "blur(4px)" }}>
          <div className="slide-in" onClick={e => e.stopPropagation()} style={{ background: "linear-gradient(180deg, #1e1e3f, #16163a)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "24px 24px 0 0", padding: "28px 24px 40px", width: "100%", maxWidth: 500, maxHeight: "90vh", overflowY: "auto" }}>
            <h3 style={{ fontSize: 20, fontWeight: 900, marginBottom: 6, color: "#f0f0f0", fontFamily: "'Space Mono', monospace" }}>🏷️ Labels beheren</h3>
            <p style={{ fontSize: 12, opacity: 0.4, marginBottom: 20 }}>Maak je eigen labels aan voor taken</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
              {categories.map(c => (
                <div key={c.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "12px 16px" }}>
                  <span style={{ fontSize: 15, fontWeight: 600 }}>{c.icon} {c.label}</span>
                  <button onClick={() => deleteLabel(c.id)} style={{ background: "rgba(255,100,100,0.15)", border: "none", borderRadius: 8, padding: "4px 10px", cursor: "pointer", color: "#FF6B6B", fontSize: 12, fontWeight: 700 }}>Verwijder</button>
                </div>
              ))}
            </div>
            <div style={{ borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 20 }}>
              <label style={{ fontSize: 11, opacity: 0.5, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", display: "block", marginBottom: 10, color: "#fff" }}>Nieuw label</label>
              <input placeholder="Naam van label..." value={newLabel.label} onChange={e => setNewLabel(l => ({ ...l, label: e.target.value }))} onKeyDown={e => e.key === "Enter" && addLabel()}
                style={{ width: "100%", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, padding: "10px 14px", color: "#fff", fontSize: 14, outline: "none", marginBottom: 12 }} />
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                {LABEL_ICONS.map(icon => (
                  <button key={icon} onClick={() => setNewLabel(l => ({ ...l, icon }))} style={{ width: 36, height: 36, borderRadius: 8, fontSize: 18, background: newLabel.icon === icon ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.05)", border: newLabel.icon === icon ? "1px solid rgba(255,255,255,0.4)" : "1px solid transparent", cursor: "pointer" }}>{icon}</button>
                ))}
              </div>
              <button onClick={addLabel} style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg, #4ECDC4, #2ecc71)", color: "#fff", border: "none", borderRadius: 12, fontSize: 15, fontWeight: 800, cursor: "pointer" }}>+ Label toevoegen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
